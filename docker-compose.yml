version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: orientta_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orientta_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orientta_pass}
      POSTGRES_DB: ${POSTGRES_DB:-orientta_hunter}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orientta_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
    container_name: orientta_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: orientta_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  redisdata:
